display_order: [fitness, is_valid, normed_steps]
specs:
  fitness:
    description: Primary objective (size of certified set)
    decimals: 0
    is_primary: true
    higher_is_better: true
    lower_bound: 0
    upper_bound: 500
    include_in_prompts: true
    significant_change: 1

  normed_steps:
    description: Margin (squared-distance gap; larger is better)
    decimals: 0
    is_primary: false
    higher_is_better: false
    include_in_prompts: true
    significant_change: 1
    lower_bound: 0

  is_valid:
    description: Program validity (1 valid, 0 invalid)
    decimals: 0
    is_primary: false
    higher_is_better: true
    lower_bound: 0
    upper_bound: 1
    include_in_prompts: true
